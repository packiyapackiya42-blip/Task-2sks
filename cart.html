<div class="container">
    <div class="product">
        
        <!-- Product Image -->
        <div class="product-image">
            <img src="https://via.placeholder.com/300" alt="Product Image">
        </div>

        <!-- Product Details -->
        <div class="product-details">
            <h1>Smart Watch</h1>
            <p class="price">₹1999</p>
            <p class="description">
                This smart watch comes with fitness tracking, heart rate monitoring, and long battery life.
            </p>

            <!-- Quantity -->
            <label>Quantity:</label>
            <input type="number" value="1" min="1" title="Quantity">

            <!-- Buttons -->
            <div class="buttons">
                <button class="add-cart">Add to Cart</button>
                <button class="buy-now">Buy Now</button>
            </div>
        </div>
